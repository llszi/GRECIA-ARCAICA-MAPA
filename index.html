<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grécia Arcaica - 30 Territórios</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #storymap-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
        .loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #555;
            z-index: 10;
            background: rgba(255,255,255,0.95);
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="storymap-container">
        <!-- Pequena mensagem que some quando o iframe carrega (opcional) -->
        <div class="loading-message" id="loadingMsg">
            <h3>🗺️ Carregando mapa interativo...</h3>
            <p>Grécia Arcaica - 30 territórios</p>
        </div>
        <iframe 
            src="https://uploads.knightlab.com/storymapjs/969efae018813e65da5a8eeaf92e5bfd/grecia-arcaica/index.html" 
            frameborder="0" 
            width="100%" 
            height="100%" 
            allowfullscreen
            title="StoryMap da Grécia Arcaica - 30 Territórios"
            onload="document.getElementById('loadingMsg').style.display='none'">
            <p>Seu navegador não suporta iframes. <a href="https://uploads.knightlab.com/storymapjs/969efae018813e65da5a8eeaf92e5bfd/grecia-arcaica/index.html">Clique aqui para abrir o mapa diretamente.</a></p>
        </iframe>
    </div>
</body>
